services:
  backend:
    image: group1_backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: group1_backend
    expose:
      - '9001'
    networks:
      - group1_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9001/health']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend_local:
    image: group1_backend_local
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: group1_backend_local
    command: ["uvicorn", "backend_local:app", "--host", "0.0.0.0", "--port", "9002"]
    expose:
      - '9002'
    networks:
      - group1_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9002/health']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    image: group1_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: group1_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '22050:7001'
    expose:
      - '8001'
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    networks:
      - group1_net

  prometheus:
    image: prom/prometheus:latest
    container_name: group1_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - group1_prometheus_data:/prometheus
    ports:
      - '22051:9090'
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      backend_local:
        condition: service_started
    networks:
      - group1_net

networks:
  group1_net:
    driver: bridge

volumes:
  group1_prometheus_data:
    driver: local
