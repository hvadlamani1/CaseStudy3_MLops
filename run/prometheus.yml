global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'frontend'
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend:8001']

  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:9001']

  - job_name: 'backend_local'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend_local:9002']

  - job_name: 'node_metrics'
    static_configs:
      - targets: 
        - 'frontend:9100'
        - 'backend:9100'
        - 'backend_local:9100'
